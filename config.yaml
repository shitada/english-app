# English Practice App Configuration

# Copilot SDK settings
copilot:
  model: "claude-sonnet-4-20250514"
  timeout: 120
  max_retries: 3
  retry_delays: [5, 15, 45]

# Logging
logging:
  level: "INFO"
  file: "logs/app.log"
  max_bytes: 5242880  # 5MB
  backup_count: 3

# Conversation scenarios (Role Play)
conversation_topics:
  - id: "hotel_checkin"
    label: "Hotel Check-in"
    description: "Check into a hotel, ask about amenities"
    scenario: "You are a hotel front desk clerk. The user is a guest checking in."
    goal: "Complete the check-in process naturally."
  - id: "restaurant_order"
    label: "Restaurant Order"
    description: "Order food, ask about the menu, pay the bill"
    scenario: "You are a waiter at a restaurant. The user is a customer."
    goal: "Take the customer's order and handle any requests."
  - id: "job_interview"
    label: "Job Interview"
    description: "Answer interview questions, discuss experience"
    scenario: "You are an interviewer at a tech company. The user is the candidate."
    goal: "Conduct a realistic job interview."
  - id: "doctor_visit"
    label: "Doctor Visit"
    description: "Describe symptoms, understand the diagnosis"
    scenario: "You are a doctor. The user is a patient describing their symptoms."
    goal: "Diagnose the patient and give advice."
  - id: "shopping"
    label: "Shopping"
    description: "Ask about products, sizes, prices, returns"
    scenario: "You are a shop assistant. The user is a customer looking for clothes."
    goal: "Help the customer find what they need."
  - id: "airport"
    label: "At the Airport"
    description: "Check-in, go through security, find the gate"
    scenario: "You are an airline staff member. The user is a passenger."
    goal: "Help the passenger with their travel needs."

# Vocabulary topics (Contextual - linked to scenarios)
vocabulary_topics:
  - id: "hotel_checkin"
    label: "Hotel & Accommodation"
    description: "Reservation, check-in, amenities, complaints"
  - id: "restaurant_order"
    label: "Restaurant & Dining"
    description: "Menu, ordering, allergies, tipping"
  - id: "job_interview"
    label: "Job Interview"
    description: "Resume, qualifications, strengths, salary"
  - id: "doctor_visit"
    label: "Health & Medical"
    description: "Symptoms, diagnosis, prescription, insurance"
  - id: "shopping"
    label: "Shopping & Retail"
    description: "Sizes, colors, prices, returns, discounts"
  - id: "airport"
    label: "Travel & Transport"
    description: "Boarding, delays, luggage, immigration"

# Vocabulary quiz
vocabulary_quiz:
  default_count: 10

# Prompts
prompts:
  conversation_partner: |
    You are playing a specific role in a real-life scenario. Stay in character throughout the conversation.

    Scenario: {scenario}
    Your role: {role}
    Goal: {goal}

    Guidelines:
    - Stay in character — respond as your role would in real life
    - Keep responses concise (2-4 sentences) for natural dialogue flow
    - Adjust language complexity to the user's level
    - Guide the conversation toward completing the scenario goal
    - Use natural, everyday English appropriate for the situation
    - If the user seems stuck, offer helpful prompts or choices
    - Do not include emojis or decorative icons in your reply.

    Start by greeting the user in character and initiating the scenario.

  grammar_checker: |
    You are an English language expert. Analyze the user's English message and provide feedback.

    Return your analysis as a JSON object with this exact structure:
    {{
      "corrected_text": "The grammatically correct version of their message",
      "is_correct": true/false,
      "errors": [
        {{
          "original": "the incorrect part",
          "correction": "the correct version",
          "explanation": "Brief explanation of the error"
        }}
      ],
      "suggestions": [
        {{
          "original": "what the user said",
          "better": "a more natural/advanced expression",
          "explanation": "Why this alternative is better"
        }}
      ]
    }}

    Rules:
    - If the message is grammatically correct, set is_correct to true and errors to an empty array
    - Always look for opportunities to suggest more natural or advanced expressions in the suggestions array
    - Keep explanations concise and clear
    - Focus on the most important 1-3 errors/suggestions, not every minor issue
    - Return ONLY the JSON object, no additional text

    User's message: {user_message}

  pronunciation_checker: |
    You are an English shadowing coach. The user listened to a reference sentence and then spoke it aloud (shadowing). Their speech was transcribed by speech recognition.

    Compare the reference text with the user's transcription and evaluate both accuracy and fluency.

    Return your analysis as a JSON object with this exact structure:
    {{
      "overall_score": 1-10,
      "overall_feedback": "General assessment of their shadowing attempt",
      "word_feedback": [
        {{
          "expected": "the expected word",
          "heard": "what was recognized (or 'missing' if omitted)",
          "is_correct": true/false,
          "tip": "Pronunciation tip for this word (if incorrect)",
          "phoneme_issues": [
            {{
              "target_sound": "the correct sound (e.g. θ, r, ʃ)",
              "produced_sound": "what was likely produced (e.g. s, l, ʒ)",
              "position": "beginning/middle/end of word"
            }}
          ]
        }}
      ],
      "fluency_score": 1-10,
      "fluency_feedback": "Assessment of rhythm, intonation, and natural flow",
      "focus_areas": ["List of sounds or patterns to practice"],
      "common_patterns": ["Description of recurring sound substitution patterns, e.g. 'θ replaced with s (th-fronting)'"]
    }}

    Rules:
    - Compare word by word between reference and transcription
    - Evaluate both accuracy AND fluency (rhythm, intonation, natural flow)
    - Provide specific, actionable pronunciation tips
    - Be encouraging — highlight what they got right
    - Return ONLY the JSON object

    Reference text: {reference_text}
    User's transcription: {user_transcription}

  vocabulary_quiz_generator: |
    You are an English vocabulary teacher specializing in contextual learning. Generate a vocabulary quiz for the given real-life scenario.

    Generate exactly {count} quiz questions. Each question should test knowledge of a word, phrase, or expression actually used in this situation.

    Return a JSON object with this exact structure:
    {{
      "questions": [
        {{
          "word": "the word, phrase, or expression being tested",
          "correct_meaning": "the correct meaning/definition",
          "wrong_options": ["wrong meaning 1", "wrong meaning 2", "wrong meaning 3"],
          "example_sentence": "A realistic example dialogue from the scenario",
          "context_note": "When and where you would use this in real life",
          "difficulty": 1-3
        }}
      ]
    }}

    Rules:
    - Focus on practical vocabulary actually used in "{topic}" situations
    - Include a mix of single words, phrases, and common expressions
    - Example sentences should be realistic dialogues from the scenario
    - context_note explains the real-life usage context
    - Wrong options should be plausible but clearly incorrect
    - Difficulty 1 = beginner, 2 = intermediate, 3 = advanced
    - Return ONLY the JSON object

    Scenario: {topic}

  conversation_summary: |
    Summarize this English conversation briefly. Highlight:
    1. Key topics discussed
    2. Notable vocabulary used
    3. The user's overall communication level

    Do not include emojis or decorative icons in your reply.

    Conversation:
    {conversation}

    Return a JSON object:
    {{
      "summary": "Brief summary of the conversation",
      "key_vocabulary": ["word1", "word2"],
      "communication_level": "beginner/intermediate/advanced",
      "tip": "One specific tip for improvement"
    }}

  conversation_quiz: |
    Based on this English conversation, generate {count} comprehension quiz questions.
    Focus on vocabulary meaning, contextual usage, and comprehension of the discussion.

    Conversation:
    {conversation}

    Key vocabulary from the conversation: {vocabulary}

    Generate multiple-choice questions (4 options each). Each question should test
    understanding of vocabulary or phrases actually used in the conversation.

    Do not include emojis or decorative icons in your reply.

    Return a JSON object:
    {{
      "questions": [
        {{
          "question": "What does the phrase '...' mean in this conversation?",
          "options": ["option A", "option B", "option C", "option D"],
          "correct_index": 0,
          "explanation": "Brief explanation of why this is correct"
        }}
      ]
    }}
