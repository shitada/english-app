name: CI

on:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend dependencies
        run: uv sync

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Run backend tests (unit + integration)
        run: uv run pytest tests/unit tests/integration -v

      - name: TypeScript type check
        run: cd frontend && npx tsc --noEmit

      - name: Smoke test (real server + real DB)
        run: uv run python tests/smoke_test.py

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests (headless)
        run: uv run pytest tests/e2e -v --timeout=120
