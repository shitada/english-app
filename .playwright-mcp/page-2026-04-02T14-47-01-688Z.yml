- generic [ref=e2]: "{\"sentences\":[{\"text\":\"Here's the menu for you.\",\"topic\":\"Restaurant Order\",\"difficulty\":\"beginner\"},{\"text\":\"We also have a butternut squash ravioli in a sage brown butter if you're leaning toward something lighter.\",\"topic\":\"Restaurant Order\",\"difficulty\":\"advanced\"},{\"text\":\"Take your time looking things over, and I'll be back in a few minutes to check on you.\",\"topic\":\"Restaurant Order\",\"difficulty\":\"advanced\"},{\"text\":\"Can I grab you a water or anything to sip on while you decide?\",\"topic\":\"Restaurant Order\",\"difficulty\":\"intermediate\"},{\"text\":\"My name's Marco, and I'll be taking care of you today.\",\"topic\":\"Restaurant Order\",\"difficulty\":\"intermediate\"},{\"text\":\"Good afternoon and welcome to The Grand Meridian!\",\"topic\":\"Hotel Check-in\",\"difficulty\":\"beginner\"},{\"text\":\"I hope you had a pleasant journey getting here.\",\"topic\":\"Hotel Check-in\",\"difficulty\":\"advanced\"},{\"text\":\"My name is David, and I'll be taking care of your check-in today.\",\"topic\":\"Hotel Check-in\",\"difficulty\":\"advanced\"},{\"text\":\"Do you have a reservation with us, or would you be looking to book a room for tonight?\",\"topic\":\"Hotel Check-in\",\"difficulty\":\"advanced\"},{\"text\":\"I'd be happy to help you check in for your London flight.\",\"topic\":\"At the Airport\",\"difficulty\":\"beginner\"}]}"