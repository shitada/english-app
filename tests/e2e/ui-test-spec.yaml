        action: click the retry button (wotd-retry) in the result phase
        expect: Result area disappears and "Make a Sentence" button reappears
        type: functional
        priority: medium
        added_in: 593

      - id: home-030
        target: Phrase of the Day "Shadow ×3" button starts a 3-attempt drill
        action: click the Shadow ×3 button (shadow-drill-btn) in the Phrase of the Day card
        expect: A drill panel (shadow-drill-panel) appears with three pips (shadow-pip-0, shadow-pip-1, shadow-pip-2) initially in pending/in-progress states
        type: functional
        priority: medium
        added_in: 657

      - id: home-031
        target: Shadow drill summary appears when all three attempts are scored
        action: complete the 3-attempt shadow drill (mocked SpeechRecognition + speechSynthesis)
        expect: shadow-drill-summary section renders with Best %, Avg %, Restart drill button, and shadow-drill-mastered badge when every pip is >=80%
        type: functional
        priority: medium
        added_in: 657

      - id: home-032
        target: Listening Warmup tile is present on the Home page
        action: locate element with data-testid="listening-warmup-tile"
        expect: A clickable tile labeled "Listening Warmup" appears with description "60-second passive ear-training" and a Start button
        type: functional
        priority: medium
        added_in: 659

      - id: home-033
        target: Clicking the Listening Warmup tile opens the modal panel
        action: click the listening-warmup-tile button
        expect: A modal with data-testid="listening-warmup-panel" appears containing warmup-progress-ring, warmup-current-sentence, warmup-pause, warmup-skip, and warmup-stop controls
        type: functional
        priority: medium
        added_in: 659

      - id: home-034
        target: Pressing Escape closes the Listening Warmup modal
        action: open the warmup modal then press Escape
        expect: listening-warmup-panel is removed from the DOM and focus returns to the Home page
        type: functional
        priority: low
        added_in: 659

  conversation:
    path: /conversation
    tests:
      # --- Select phase ---
      - id: conv-001
        target: Difficulty buttons toggle selection
        action: click each difficulty button (Beginner, Intermediate, Advanced)
        expect: Clicked button gets primary background, others reset to default
        type: functional
        priority: high
        added_in: 0

      - id: conv-002
        target: Duration buttons toggle selection
        action: click each duration button (3 min, 5 min, 10 min, No limit)
        expect: Clicked button gets primary background, others reset
        type: functional
        priority: high
        added_in: 265

      - id: conv-003
        target: Topic cards render with emoji, label, description
        action: snapshot topic selection area
        expect: All topic cards visible with emoji, name, description; no truncation
        type: visual
        priority: critical
        added_in: 0

      - id: conv-004
        target: Topic favorite star toggles
        action: click star icon on a topic card
        expect: Star fills/unfills, card moves to top or stays
        type: functional
        priority: medium
        added_in: 285

      - id: conv-005
        target: Topic card click starts conversation
        action: click any topic card
        expect: Loading spinner appears, then chat phase renders with AI message
        type: functional
        priority: critical
        added_in: 0

      - id: conv-006
        target: Past conversations list renders
        action: snapshot past conversations section (if any exist)
