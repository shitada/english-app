# =============================================================================
# UI Test Specification — Playwright E2E Tests
# =============================================================================
# This file defines what to test on each page. The tester agent reads this
# spec and executes each test item via Playwright MCP tools.
#
# Structure:
#   pages.<page>.path          — URL path
#   pages.<page>.tests[]       — list of test items
#     .id                      — unique test ID (page-NNN)
#     .target                  — human description of what to test
#     .action                  — what Playwright should do
#     .expect                  — pass criteria
#     .type                    — functional | visual | state | navigation | error
#     .added_in                — iteration number when this test was added
#     .priority                — critical | high | medium | low
#
# The orchestrator MUST update this file when adding/modifying UI elements.
# =============================================================================

pages:
  home:
    path: /
    tests:
      - id: home-001
        target: Navigation bar renders with all links
        action: snapshot and check for nav links (Conversation, Pronunciation, Listening, Vocabulary, Dashboard)
        expect: All 5 navigation links visible and not disabled
        type: functional
        priority: critical
        added_in: 0

      - id: home-002
        target: Theme toggle switches dark/light mode
        action: click theme toggle button (Sun/Moon icon)
        expect: Body class changes to dark/light, icon switches
        type: functional
        priority: medium
        added_in: 291

      - id: home-003
        target: Locale toggle switches EN/JA
        action: click locale toggle button (Globe icon)
        expect: Language code display changes between EN and JA
        type: functional
        priority: medium
        added_in: 335

      - id: home-004
        target: Daily streak card displays correctly
        action: snapshot Home page
        expect: Streak count visible with flame icon, no text overflow
        type: visual
        priority: high
        added_in: 0

      - id: home-005
        target: Word of the Day TTS button works
        action: click TTS button on Word of the Day card
        expect: Button responds (not stuck disabled), no console errors
        type: functional
        priority: high
        added_in: 313

      - id: home-006
        target: Recently Practiced card shows activities
        action: snapshot Home page
        expect: Activity items render with module icon, detail text, and relative time
        type: visual
        priority: medium
        added_in: 334

      - id: home-007
        target: Streak milestones timeline renders
        action: snapshot streak milestones section
        expect: Milestone badges visible, achieved ones have gold background
        type: visual
        priority: medium
        added_in: 333

      - id: home-008
        target: Mobile hamburger menu opens/closes
        action: resize to 375px width, click hamburger button
        expect: Nav menu expands, shows all links; click again to close
        type: functional
        priority: high
        added_in: 0
      - id: home-009
        target: Smart Review Queue card displays
        action: scroll to Smart Review Queue section
        expect: Card visible with title, count badge, items grouped by module with priority dots
        type: functional
        priority: medium
        added_in: 451
      - id: home-010
        target: Smart Review Queue collapse/expand
        action: click the Smart Review Queue header
        expect: Card collapses hiding items; click again expands showing items
        type: functional
        priority: low
        added_in: 451
      - id: home-011
        target: Speaking Journal card displays with daily prompt
        action: scroll to Speaking Journal section
        expect: Card visible with title, quoted prompt text, Start Speaking button
        type: functional
        priority: medium
        added_in: 452
      - id: home-012
        target: Speaking Journal WPM trend sparkline
        action: check Speaking Journal card after entries exist
        expect: WPM trend bar chart appears below main card area when history has 2+ entries
        type: functional
        priority: low
        added_in: 452

  conversation:
    path: /conversation
    tests:
      # --- Select phase ---
      - id: conv-001
        target: Difficulty buttons toggle selection
        action: click each difficulty button (Beginner, Intermediate, Advanced)
        expect: Clicked button gets primary background, others reset to default
        type: functional
        priority: high
        added_in: 0

      - id: conv-002
        target: Duration buttons toggle selection
        action: click each duration button (3 min, 5 min, 10 min, No limit)
        expect: Clicked button gets primary background, others reset
        type: functional
        priority: high
        added_in: 265

      - id: conv-003
        target: Topic cards render with emoji, label, description
        action: snapshot topic selection area
        expect: All topic cards visible with emoji, name, description; no truncation
        type: visual
        priority: critical
        added_in: 0

      - id: conv-004
        target: Topic favorite star toggles
        action: click star icon on a topic card
        expect: Star fills/unfills, card moves to top or stays
        type: functional
        priority: medium
        added_in: 285

      - id: conv-005
        target: Topic card click starts conversation
        action: click any topic card
        expect: Loading spinner appears, then chat phase renders with AI message
        type: functional
        priority: critical
        added_in: 0

      - id: conv-006
        target: Past conversations list renders
        action: snapshot past conversations section (if any exist)
        expect: Each conversation shows emoji, topic, difficulty, message count, date
        type: visual
        priority: medium
        added_in: 0

      - id: conv-007
        target: Role swap toggle works
        action: click "You play the staff role" toggle
        expect: Toggle shows enabled state, explanation text appears
        type: functional
        priority: medium
        added_in: 293

      # --- Chat phase (requires starting a conversation first) ---
      - id: conv-010
        target: Chat input accepts text and send works
        action: type text in input, click Send button
        expect: User message appears in chat, input clears, AI response appears
        type: functional
        priority: critical
        added_in: 0

      - id: conv-011
        target: Timer displays and counts down
        action: start conversation with 3 min duration, observe timer
        expect: Timer shows "3:00" format, visible in header
        type: functional
        priority: high
        added_in: 265

      - id: conv-012
        target: End button stops conversation
        action: click End button (Square icon)
        expect: Summary phase renders with conversation stats
        type: functional
        priority: critical
        added_in: 0

      - id: conv-013
        target: Speech speed buttons toggle
        action: click speed buttons (turtle, 1x, rabbit)
        expect: Clicked button gets primary background
        type: functional
        priority: medium
        added_in: 0

      - id: conv-014
        target: Listen mode toggle works
        action: click Listen mode button (Headphones icon)
        expect: AI messages become hidden with "Tap to reveal" placeholder
        type: functional
        priority: medium
        added_in: 276

      - id: conv-015
        target: Voice mode toggle works
        action: click Voice mode button
        expect: Green highlight, pulse animation, status indicator appears
        type: functional
        priority: medium
        added_in: 348

      - id: conv-016
        target: Grammar accuracy HUD shows in chat
        action: send a message in chat, check stats bar
        expect: Grammar stats bar shows correct/total with percentage
        type: visual
        priority: medium
        added_in: 274

      # --- Summary phase ---
      - id: conv-020
        target: Summary shows key vocabulary and tip
        action: end conversation, check summary
        expect: Key vocabulary tags visible, communication level shown, tip displayed
        type: visual
        priority: high
        added_in: 0

      - id: conv-021
        target: Quick Quiz button starts quiz
        action: click "Take Quick Quiz" button
        expect: Quiz questions appear with multiple choice options
        type: functional
        priority: high
        added_in: 270

      - id: conv-022
        target: Start New Conversation button works
        action: click "Start New Conversation"
        expect: Returns to select phase, state is clean
        type: functional
        priority: critical
        added_in: 0

