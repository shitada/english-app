        type: visual
        priority: medium
        added_in: 0

      - id: conv-007
        target: Role swap toggle works
        action: click "You play the staff role" toggle
        expect: Toggle shows enabled state, explanation text appears
        type: functional
        priority: medium
        added_in: 293

      - id: conv-008
        target: Quick Reply mode toggle works
        action: click "⚡ Quick Reply mode" toggle in select phase
        expect: Toggle shows enabled state with primary background, explanation text "AI replies in one short sentence" appears, choice persists in localStorage
        type: functional
        priority: medium
        added_in: 638

      - id: conv-009
        target: Quick Reply ⚡ badge shows in chat header when active
        action: enable Quick Reply, start a conversation
        expect: Chat header shows "⚡ Quick" badge next to scenario title
        type: visual
        priority: medium
        added_in: 638

      # --- Chat phase (requires starting a conversation first) ---
      - id: conv-010
        target: Chat input accepts text and send works
        action: type text in input, click Send button
        expect: User message appears in chat, input clears, AI response appears
        type: functional
        priority: critical
        added_in: 0

      - id: conv-011
        target: Timer displays and counts down
        action: start conversation with 3 min duration, observe timer
        expect: Timer shows "3:00" format, visible in header
        type: functional
        priority: high
        added_in: 265

      - id: conv-012
        target: End button stops conversation
        action: click End button (Square icon)
        expect: Summary phase renders with conversation stats
        type: functional
        priority: critical
        added_in: 0

      - id: conv-013
        target: Speech speed buttons toggle
        action: click speed buttons (turtle, 1x, rabbit)
        expect: Clicked button gets primary background
        type: functional
        priority: medium
        added_in: 0

      - id: conv-014
        target: Listen mode toggle works
        action: click Listen mode button (Headphones icon)
        expect: AI messages become hidden with "Tap to reveal" placeholder
        type: functional
        priority: medium
        added_in: 276

      - id: conv-015
        target: Voice mode toggle works
        action: click Voice mode button
        expect: Green highlight, pulse animation, status indicator appears
        type: functional
        priority: medium
        added_in: 348

      - id: conv-015a
        target: Voice mode reconnecting indicator shown on speech recognition failure
        action: Enable voice mode in chat, simulate speech recognition ending with no transcript (no-speech error)
        expect: After ~2s delay, status indicator shows '🔄 Reconnecting…' with blue background, then listening resumes
        type: functional
        priority: high
        added_in: 503

      - id: conv-016
        target: Grammar accuracy HUD shows in chat
        action: send a message in chat, check stats bar
        expect: Grammar stats bar shows correct/total with percentage
        type: visual
        priority: medium
        added_in: 274

      # --- Summary phase ---
      - id: conv-020
        target: Summary shows key vocabulary and tip
        action: end conversation, check summary
        expect: Key vocabulary tags visible, communication level shown, tip displayed
        type: visual
        priority: high
        added_in: 0

      - id: conv-021
        target: Quick Quiz button starts quiz
        action: click "Take Quick Quiz" button
        expect: Quiz questions appear with multiple choice options
        type: functional
        priority: high
        added_in: 270

      - id: conv-022
        target: Start New Conversation button works
        action: click "Start New Conversation"
        expect: Returns to select phase, state is clean
        type: functional
        priority: critical
        added_in: 0

      - id: conv-023
        target: Vocab tag save buttons appear in summary
        action: end conversation, check key vocabulary section in summary
        expect: Each vocab tag has a BookmarkPlus save icon button next to the word
        type: functional
        priority: high
        added_in: 510

      - id: conv-024
        target: Individual vocab save shows checkmark after saving
        action: click BookmarkPlus icon on a vocab tag
        expect: Icon changes to Check (checkmark), word appears saved with reduced opacity
        type: functional
        priority: high
        added_in: 510

      - id: conv-025
        target: Save All to Vocab Bank button saves all words
        action: click "Save All to Vocab Bank" button
        expect: All vocab tags show checkmarks, button replaced with "All vocabulary saved to bank" message
        type: functional
        priority: high
        added_in: 510

      # --- Replay Speak Through walkthrough ---
      - id: conv-026
        target: Speak Through button visible in replay phase
        action: Navigate to replay phase for a past conversation
        expect: A "🗣️ Speak Through" button is visible above the replay stepper
        type: visual
        priority: high
        added_in: 512

      - id: conv-027
        target: Speak Through button opens walkthrough view
        action: Click "🗣️ Speak Through" button in replay phase
        expect: Walkthrough component renders with progress bar, AI message, and Start Speaking button; replay stepper is hidden
        type: functional
        priority: high
        added_in: 512

      - id: conv-028
        target: Speak Through close button returns to normal replay
        action: Click X close button in Speak Through walkthrough header
        expect: Walkthrough closes, normal ConversationReplay stepper is visible again
        type: functional
        priority: high
        added_in: 512

      - id: conv-029
        target: Speak Through shows no-user-turns message when no user turns
        action: Open Speak Through for a conversation with only AI messages
        expect: Message "No user turns found" with a Close button is displayed
        type: functional
        priority: medium
        added_in: 512

      - id: conv-030
        target: Start conversation error shows inline banner instead of alert
        action: Attempt to start a conversation when backend is down (mock network failure)
        expect: Red error banner with "⚠️ Failed to start conversation" text and ✕ dismiss button appears in select phase, no browser alert dialog
        type: error
        priority: high
        added_in: 513

      - id: conv-031
        target: Start error banner dismiss button works
        action: Click ✕ button on the start error banner
        expect: Error banner disappears, topic cards remain interactive
        type: functional
        priority: medium
        added_in: 513

      - id: conv-032
        target: Send message error shows inline error banner with retry button
        action: Send a message when API returns 500 error (mock failure)
        expect: Red error banner appears below last user message with error text and "🔄 Retry" button, no fake assistant message in chat
        type: error
        priority: high
        added_in: 513

      - id: conv-033
        target: Retry button resends the failed message
        action: Click "🔄 Retry" button on the send error banner
        expect: Error banner disappears, loading spinner appears, message is resent without duplicating user message in chat
        type: functional
        priority: high
        added_in: 513

      - id: conv-034
        target: Typing new message clears send error state
        action: After a send error, type a new character in the message input
        expect: Error banner and retry button disappear
        type: functional
        priority: medium
        added_in: 513

      - id: conv-035
        target: Rate limit (429) error shows retry banner
        action: Send a message when API returns 429 error (mock rate limit)
        expect: Error banner shows "Too many requests" text with retry button, user message remains in chat history
        type: error
        priority: high
        added_in: 513

      - id: conv-036
        target: Delete single conversation shows inline confirm dialog
        action: Click trash icon on a past conversation row
        expect: Inline ConfirmDialog appears below the past conversations list with "Delete this conversation?" message, Cancel and Delete buttons; no browser confirm() dialog
        type: functional
        priority: high
        added_in: 520

      - id: conv-037
        target: Clear All shows inline confirm dialog
        action: Click "Clear All" link above past conversations list
        expect: Inline ConfirmDialog appears with "Delete all past conversations?" message, Cancel and Delete buttons; no browser confirm() dialog
        type: functional
        priority: high
        added_in: 520

      - id: conv-038
        target: Confirm dialog Cancel dismisses without deleting
        action: Click trash icon on a conversation, then click Cancel in the ConfirmDialog
        expect: ConfirmDialog disappears, conversation list unchanged
        type: functional
        priority: medium
        added_in: 520

      - id: conv-039
        target: Confirm dialog Delete removes conversation
        action: Click trash icon on a conversation, then click Delete in the ConfirmDialog
        expect: ConfirmDialog disappears, conversation removed from list
        type: functional
        priority: high
        added_in: 520

      - id: conv-040
        target: Delete error shows inline error banner
        action: Click Delete in ConfirmDialog when API returns error (mock network failure)
        expect: Error banner with message appears in the select phase, no silent failure
        type: error
        priority: medium
        added_in: 520

      - id: conv-041
        target: Say It button appears alongside Try Again for grammar corrections
        action: Send a message with grammar errors, check the FeedbackPanel correction area
        expect: Both "✏️ Try Again" and "🎤 Say It" buttons visible in a row below the corrected text
        type: functional
        priority: high
        added_in: 521

      - id: conv-042
        target: Say It button triggers TTS and opens speak drill panel
        action: Click "🎤 Say It" button in FeedbackPanel
        expect: Speak drill panel opens with "Say the corrected sentence aloud" prompt and "Start Speaking" button; corrected text is spoken via TTS
        type: functional
        priority: high
        added_in: 521

      - id: conv-043
        target: Start Speaking begins recording with stop button
        action: Click "Start Speaking" in the speak drill panel
        expect: Recording indicator "● Recording…" appears with MicOff Stop button; live transcript shown as user speaks
        type: functional
        priority: high
        added_in: 521

      - id: conv-044
        target: Speak drill shows word-by-word color-coded result on mismatch
        action: Speak an incorrect version and click Stop in the speak drill
        expect: "Almost!" label appears with InlineCorrectionDiff showing green (match) and red (mismatch) words; "Try Again" button with mic icon visible
        type: functional
        priority: high
        added_in: 521

      - id: conv-045
        target: Speak drill shows success message on accurate speech
        action: Speak the corrected sentence accurately (≥90% match) and stop recording
        expect: Speak panel closes, "✅ Excellent! You got it right!" success banner appears
        type: functional
        priority: high
        added_in: 521

      - id: conv-046
        target: InlineCorrectionDiff uses CSS variables for dark mode
        action: Enable dark mode, trigger a "retry" result in Try Again or Say It drill
        expect: Word colors use var(--success) and var(--danger) CSS variables, no hardcoded hex colors visible
        type: visual
        priority: medium
        added_in: 521

      - id: conv-047
        target: Say It Better button appears next to each suggestion when speech is supported
        action: Send a correct message with improvement suggestions, check FeedbackPanel suggestions
        expect: Each suggestion shows a "🗣️ Say It Better" outlined button next to the speaker icon
        type: functional
        priority: high
        added_in: 522

      - id: conv-048
        target: Say It Better triggers TTS and opens suggestion speak drill panel
        action: Click "🗣️ Say It Better" on a suggestion
        expect: Drill panel opens below the suggestion with "Say the better expression aloud" prompt and "Start Speaking" button; better text is spoken via TTS
        type: functional
        priority: high
        added_in: 522

      - id: conv-049
        target: Say It Better drill shows success on accurate speech
        action: Speak the better expression accurately (≥90% match) and stop recording
        expect: Drill panel shows "✅ Nice! You said it better!" success message and closes
        type: functional
        priority: high
        added_in: 522

      - id: conv-050
        target: Say It Better drill shows retry with word diff on mismatch
        action: Speak an inaccurate version of the better expression and stop recording
        expect: "Almost!" label with InlineCorrectionDiff color-coded words and "Try Again" button with mic icon
        type: functional
        priority: high
        added_in: 522

      - id: conv-051
        target: Only one Say It Better drill active at a time
        action: Click "🗣️ Say It Better" on one suggestion while another drill is already open
        expect: Other suggestions hide their "Say It Better" buttons while a drill is active; only active drill shown
        type: functional
        priority: medium
        added_in: 522

      - id: conv-052
        target: Shadow Phrase mic icon appears next to key phrase speaker icon
        action: Start a conversation, receive an AI message with key phrases highlighted
        expect: Each highlighted key phrase shows both 🔊 and 🎤 icons; 🎤 has data-testid="shadow-drill-mic"
        type: functional
        priority: high
        added_in: 523

      - id: conv-053
        target: Clicking shadow mic opens inline drill panel
        action: Click 🎤 icon next to a highlighted key phrase
        expect: Inline shadow drill panel appears below the phrase with data-testid="shadow-drill-panel", shows "🔊 Listen..." then transitions to "🎤 Your turn!" with Record button
        type: functional
        priority: high
        added_in: 523

      - id: conv-054
        target: Shadow drill close button dismisses panel
        action: Click ✕ button (data-testid="shadow-drill-close") on an open shadow drill panel
        expect: Shadow drill panel disappears, key phrase returns to normal display
        type: functional
        priority: medium
        added_in: 523

      - id: conv-055
        target: Shadow drill record and submit shows word-level diff result
        action: Click Record in shadow drill, speak the phrase, click Stop, then click Check
